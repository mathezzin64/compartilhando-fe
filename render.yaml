services:
  - type: web
    name: compartilhando-fe-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: MONGODB_URI
        sync: false
      - key: DNS_SERVERS
        value: 8.8.8.8,1.1.1.1

  - type: web
    name: compartilhando-fe
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: compartilhando-fe-api
          envVarKey: RENDER_EXTERNAL_URL
